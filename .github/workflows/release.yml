name: build & package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Sibling library repos, pinned so a carcal tag always rebuilds identically.
# Without a ref these track the default branch, and re-running an old tag would
# silently pull whatever landed on it since.
#
# These are commit SHAs rather than tags because the Windows port is not in any
# gtcaca/libpcapng release yet (gtcaca v0.0.5 predates it). Once both cut a tag
# containing it, replace the SHAs with the tag names — `ref:` takes either.
env:
  GTCACA_REPO: stricaud/gtcaca
  GTCACA_REF: 0021df4065435fd39b6da01c15319cc2cd18a030      # "Add mingw as toolchain"
  LIBPCAPNG_REPO: stricaud/libpcapng
  LIBPCAPNG_REF: 668bb8ac2e369e2342d3b2c2c71a49ae91f5a807   # "Build with msvc"

jobs:
  package:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write          # needed to attach assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: linux-x86_64   }
          - { os: macos-14,       label: macos-arm64    }
          - { os: windows-latest, label: windows-x86_64 }

    # Every step runs in the MSYS2 UCRT64 shell on Windows, and the default
    # shell elsewhere — that is what lets one build.sh serve all three.
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}

    steps:
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          # libcaca, luajit and oniguruma are all prebuilt for MinGW — the whole
          # reason the Windows port is cheap. ':p' prefixes for the msystem.
          pacboy: >-
            toolchain:p cmake:p ninja:p nsis:p
            libcaca:p luajit:p oniguruma:p
          install: zip

      - name: Checkout carcal
        uses: actions/checkout@v4
        with: { path: carcal }

      - name: Checkout gtcaca
        uses: actions/checkout@v4
        with:
          repository: "${{ env.GTCACA_REPO }}"
          ref: "${{ env.GTCACA_REF }}"
          path: gtcaca

      - name: Checkout libpcapng
        uses: actions/checkout@v4
        with:
          repository: "${{ env.LIBPCAPNG_REPO }}"
          ref: "${{ env.LIBPCAPNG_REF }}"
          path: libpcapng

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config patchelf \
            libcaca-dev libluajit-5.1-dev libonig-dev \
            python3-dev python3-pip
          python3 -m pip install --user pybind11

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake pkg-config libcaca luajit oniguruma pybind11

      - name: Build & bundle (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: carcal
        run: |
          export GTCACA_SRC="$GITHUB_WORKSPACE/gtcaca"
          export LIBPCAPNG_SRC="$GITHUB_WORKSPACE/libpcapng"
          # libpcapng's CMake configure wants pybind11 (for its bindings)
          export CMAKE_PREFIX_PATH="$(python3 -m pybind11 --cmakedir 2>/dev/null || true)${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}"
          bash packaging/build.sh

      # Separate from the step above because $GITHUB_WORKSPACE is a backslashed
      # Windows path, which the MSYS2 shell cannot cd into; derive MSYS paths
      # from the working directory instead. libpcapng skips its pybind11
      # bindings on Windows, so no pybind11 is needed here.
      - name: Build & bundle (Windows)
        if: runner.os == 'Windows'
        working-directory: carcal
        env:
          # The checkout is shallow, so `git describe` finds no tag to name the
          # installer with — hand it the tag we were built from (empty for a
          # workflow_dispatch run, which then versions the installer 0.0.0).
          CARCAL_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          export GTCACA_SRC="$(cd ../gtcaca && pwd)"
          export LIBPCAPNG_SRC="$(cd ../libpcapng && pwd)"
          bash packaging/build.sh

      - name: Smoke-test the macOS app
        if: runner.os == 'macOS'
        working-directory: carcal
        run: |
          # Mount the .dmg and run the binary inside carcal.app, exactly as a
          # user would get it: proves the bundled dylibs still resolve through
          # @executable_path/../lib and that protos/ is found inside the bundle.
          printf '\xd4\xc3\xb2\xa1\x02\x00\x04\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x04\x00\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x2a\x00\x00\x00\x2a\x00\x00\x00\xaa\xbb\xcc\xdd\xee\xff\x11\x22\x33\x44\x55\x66\x08\x00\x45\x00\x00\x1c\x00\x01\x00\x00\x40\x11\x00\x00\x7f\x00\x00\x01\x7f\x00\x00\x01\x00\x35\x00\x35\x00\x08\x00\x00' > smoke.pcap
          mnt="$(hdiutil attach dist/carcal-macos-*.dmg -nobrowse -readonly | grep -o '/Volumes/.*' | head -1)"
          app="$mnt/carcal.app/Contents"
          out="$(CARCAL_PROTOS_DIR="$app/Resources/share/carcal/protos" \
                 CARCAL_GRAMMARS_DIR="$app/Resources/share/carcal/grammars" \
                 "$app/MacOS/carcal" --dump smoke.pcap)"
          echo "$out"
          hdiutil detach "$mnt" >/dev/null
          echo "$out" | grep -q "User Datagram Protocol" \
            || { echo "smoke test failed: UDP layer not dissected" >&2; exit 1; }

      - name: Smoke-test the Windows binary
        if: runner.os == 'Windows'
        working-directory: carcal
        run: |
          # Exercise the *packaged* exe, not the build-tree one. --dump is the
          # headless path: it loads the bundled DLLs, resolves protos/ relative
          # to carcal.exe, and dissects a packet — so a missing DLL or a broken
          # data-dir lookup fails the build instead of shipping.
          # A 42-byte Ethernet/IPv4/UDP frame in a classic little-endian pcap.
          printf '\xd4\xc3\xb2\xa1\x02\x00\x04\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x04\x00\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x2a\x00\x00\x00\x2a\x00\x00\x00\xaa\xbb\xcc\xdd\xee\xff\x11\x22\x33\x44\x55\x66\x08\x00\x45\x00\x00\x1c\x00\x01\x00\x00\x40\x11\x00\x00\x7f\x00\x00\x01\x7f\x00\x00\x01\x00\x35\x00\x35\x00\x08\x00\x00' > smoke.pcap
          exe="$(echo dist/carcal-windows-*/carcal.exe)"
          out="$("$exe" --dump smoke.pcap)"
          echo "$out"
          echo "$out" | grep -q "User Datagram Protocol" \
            || { echo "smoke test failed: UDP layer not dissected" >&2; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: carcal-${{ matrix.label }}
          path: |
            carcal/dist/*.tar.gz
            carcal/dist/*.pkg
            carcal/dist/*.dmg
            carcal/dist/*.AppImage
            carcal/dist/*.zip
            carcal/dist/*setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            carcal/dist/*.tar.gz
            carcal/dist/*.pkg
            carcal/dist/*.dmg
            carcal/dist/*.AppImage
            carcal/dist/*.zip
            carcal/dist/*setup.exe
