name: build & package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Sibling library repos.
#
# These track `main` while carcal, gtcaca and libpcapng are being developed
# together. carcal regularly lands code that needs an API added to a library in
# the same breath (the posa `color` grammar, the table row-color hook), and a
# pinned SHA means CI keeps building the new carcal against the old library —
# which fails with confusing "implicit declaration" / "excess elements in struct
# initializer" errors that look like carcal bugs but are just a stale pin.
#
# The cost is that a tag is only reproducible as long as the libraries' `main`
# doesn't move. That is the right trade *now*; before cutting a release, pin
# these to the tags of the library releases it was built against — `ref:` takes a
# tag, a branch or a SHA, so it is a one-line change at that point.
env:
  GTCACA_REPO: stricaud/gtcaca
  GTCACA_REF: main
  LIBPCAPNG_REPO: stricaud/libpcapng
  LIBPCAPNG_REF: main

jobs:
  package:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write          # needed to attach assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned to 22.04, not ubuntu-latest, to set the glibc floor: a binary
          # linked against a newer glibc will not start on an older distro, and
          # `latest` silently raises that floor every time GitHub rolls the
          # image. 22.04's glibc 2.35 covers Debian 12 and the current LTSes.
          # It is also what the manylinux tag on the wheel is derived from.
          - { os: ubuntu-22.04,   label: linux-x86_64   }
          - { os: macos-14,       label: macos-arm64    }
          - { os: windows-latest, label: windows-x86_64 }

    # Every step runs in the MSYS2 UCRT64 shell on Windows, and the default
    # shell elsewhere — that is what lets one build.sh serve all three.
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}

    steps:
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          # libcaca, luajit and oniguruma are all prebuilt for MinGW — the whole
          # reason the Windows port is cheap. ':p' prefixes for the msystem.
          pacboy: >-
            toolchain:p cmake:p ninja:p nsis:p
            libcaca:p luajit:p oniguruma:p
          install: zip

      - name: Checkout carcal
        uses: actions/checkout@v4
        with: { path: carcal }

      - name: Checkout gtcaca
        uses: actions/checkout@v4
        with:
          repository: "${{ env.GTCACA_REPO }}"
          ref: "${{ env.GTCACA_REF }}"
          path: gtcaca

      - name: Checkout libpcapng
        uses: actions/checkout@v4
        with:
          repository: "${{ env.LIBPCAPNG_REPO }}"
          ref: "${{ env.LIBPCAPNG_REF }}"
          path: libpcapng

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config patchelf \
            libcaca-dev libluajit-5.1-dev libonig-dev \
            python3-dev python3-pip
          python3 -m pip install --user pybind11

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake pkg-config libcaca luajit oniguruma pybind11

      - name: Build & bundle (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: carcal
        run: |
          export GTCACA_SRC="$GITHUB_WORKSPACE/gtcaca"
          export LIBPCAPNG_SRC="$GITHUB_WORKSPACE/libpcapng"
          # libpcapng's CMake configure wants pybind11 (for its bindings)
          export CMAKE_PREFIX_PATH="$(python3 -m pybind11 --cmakedir 2>/dev/null || true)${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}"
          bash packaging/build.sh

      # Separate from the step above because $GITHUB_WORKSPACE is a backslashed
      # Windows path, which the MSYS2 shell cannot cd into; derive MSYS paths
      # from the working directory instead. libpcapng skips its pybind11
      # bindings on Windows, so no pybind11 is needed here.
      - name: Build & bundle (Windows)
        if: runner.os == 'Windows'
        working-directory: carcal
        env:
          # The checkout is shallow, so `git describe` finds no tag to name the
          # installer with — hand it the tag we were built from (empty for a
          # workflow_dispatch run, which then versions the installer 0.0.0).
          CARCAL_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          export GTCACA_SRC="$(cd ../gtcaca && pwd)"
          export LIBPCAPNG_SRC="$(cd ../libpcapng && pwd)"
          bash packaging/build.sh

      - name: Smoke-test the macOS app
        if: runner.os == 'macOS'
        working-directory: carcal
        run: |
          # Mount the .dmg and run the binary inside carcal.app, exactly as a
          # user would get it: proves the bundled dylibs still resolve through
          # @executable_path/../lib and that protos/ is found inside the bundle.
          printf '\xd4\xc3\xb2\xa1\x02\x00\x04\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x04\x00\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x2a\x00\x00\x00\x2a\x00\x00\x00\xaa\xbb\xcc\xdd\xee\xff\x11\x22\x33\x44\x55\x66\x08\x00\x45\x00\x00\x1c\x00\x01\x00\x00\x40\x11\x00\x00\x7f\x00\x00\x01\x7f\x00\x00\x01\x00\x35\x00\x35\x00\x08\x00\x00' > smoke.pcap
          mnt="$(hdiutil attach dist/carcal-macos-*.dmg -nobrowse -readonly | grep -o '/Volumes/.*' | head -1)"
          app="$mnt/carcal.app/Contents"
          out="$(CARCAL_PROTOS_DIR="$app/Resources/share/carcal/protos" \
                 CARCAL_GRAMMARS_DIR="$app/Resources/share/carcal/grammars" \
                 "$app/MacOS/carcal" --dump smoke.pcap)"
          echo "$out"
          hdiutil detach "$mnt" >/dev/null
          echo "$out" | grep -q "User Datagram Protocol" \
            || { echo "smoke test failed: UDP layer not dissected" >&2; exit 1; }

      - name: Smoke-test the Windows binary
        if: runner.os == 'Windows'
        working-directory: carcal
        run: |
          # Exercise the *packaged* exe, not the build-tree one. --dump is the
          # headless path: it loads the bundled DLLs, resolves protos/ relative
          # to carcal.exe, and dissects a packet — so a missing DLL or a broken
          # data-dir lookup fails the build instead of shipping.
          # A 42-byte Ethernet/IPv4/UDP frame in a classic little-endian pcap.
          printf '\xd4\xc3\xb2\xa1\x02\x00\x04\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x04\x00\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x2a\x00\x00\x00\x2a\x00\x00\x00\xaa\xbb\xcc\xdd\xee\xff\x11\x22\x33\x44\x55\x66\x08\x00\x45\x00\x00\x1c\x00\x01\x00\x00\x40\x11\x00\x00\x7f\x00\x00\x01\x7f\x00\x00\x01\x00\x35\x00\x35\x00\x08\x00\x00' > smoke.pcap
          exe="$(echo dist/carcal-windows-*/carcal.exe)"
          out="$("$exe" --dump smoke.pcap)"
          echo "$out"
          echo "$out" | grep -q "User Datagram Protocol" \
            || { echo "smoke test failed: UDP layer not dissected" >&2; exit 1; }

      # Repack the bundle we just smoke-tested as a wheel, so `pip install carcal`
      # ships the exact tree the tarball/dmg/zip ship. PyPI is a binary channel
      # here — there is no Python in carcal — so the wheel is that bundle plus a
      # console-script shim. The platform tag is derived from the binaries
      # themselves (glibc / LC_BUILD_VERSION); see packaging/wheel.py.
      # On Windows the wheel is built and tested with the runner's *native*
      # CPython in git bash, not the MSYS2 python the rest of the job uses: an
      # MSYS2 interpreter reports a mingw platform tag and so refuses to install
      # a win_amd64 wheel — it would reject the very artifact we ship.
      - name: Set up Python for the wheel (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build & smoke-test the wheel
        working-directory: carcal
        shell: bash
        env:
          CARCAL_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          # Pick an interpreter that actually runs: on Windows a bare `python3`
          # can resolve to the Store app-execution stub, which is on PATH but
          # is not an interpreter.
          py=
          for c in python3 python; do
            if command -v "$c" >/dev/null 2>&1 && "$c" -c "import sys" >/dev/null 2>&1; then
              py="$c"; break
            fi
          done
          [ -n "$py" ] || { echo "no working python found" >&2; exit 1; }
          "$py" packaging/wheel.py

          # Install it the way a user would and dissect a packet through the
          # console script: proves pip kept the exec bit on the binary and that
          # the shim points carcal at the protos/ that shipped inside the wheel.
          printf '\xd4\xc3\xb2\xa1\x02\x00\x04\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x04\x00\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x2a\x00\x00\x00\x2a\x00\x00\x00\xaa\xbb\xcc\xdd\xee\xff\x11\x22\x33\x44\x55\x66\x08\x00\x45\x00\x00\x1c\x00\x01\x00\x00\x40\x11\x00\x00\x7f\x00\x00\x01\x7f\x00\x00\x01\x00\x35\x00\x35\x00\x08\x00\x00' > wheel-smoke.pcap
          "$py" -m venv wheelenv
          vbin=wheelenv/bin; [ -d "$vbin" ] || vbin=wheelenv/Scripts
          "$vbin/pip" install --quiet dist/*.whl
          out="$("$vbin/carcal" --dump wheel-smoke.pcap)"
          echo "$out"
          echo "$out" | grep -q "User Datagram Protocol" \
            || { echo "wheel smoke test failed: UDP layer not dissected" >&2; exit 1; }
          echo "$out" | grep -qE "[1-9][0-9]* custom protocol" \
            || { echo "wheel smoke test failed: bundled protos/ not loaded" >&2; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: carcal-${{ matrix.label }}
          path: |
            carcal/dist/*.tar.gz
            carcal/dist/*.pkg
            carcal/dist/*.dmg
            carcal/dist/*.AppImage
            carcal/dist/*.zip
            carcal/dist/*setup.exe
            carcal/dist/*.whl

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            carcal/dist/*.tar.gz
            carcal/dist/*.pkg
            carcal/dist/*.dmg
            carcal/dist/*.AppImage
            carcal/dist/*.zip
            carcal/dist/*setup.exe
            carcal/dist/*.whl

  # Publish the per-platform wheels as `pip install carcal`.
  #
  # Uses PyPI Trusted Publishing (OIDC): the `id-token: write` permission plus a
  # publisher configured on PyPI for this repo+workflow, so there is no API token
  # in repo secrets. Set that up on PyPI once, before the first tag, under
  # Manage project -> Publishing.
  publish-pypi:
    name: publish to PyPI
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Collect wheels from every platform
        uses: actions/download-artifact@v4
        with:
          pattern: carcal-*
          path: artifacts
          merge-multiple: true

      # gh-action-pypi-publish uploads everything in packages-dir, and the
      # artifacts carry .dmg/.zip/.pkg too — so hand it a directory of wheels
      # only, or the upload is rejected.
      - name: Stage wheels
        run: |
          mkdir -p wheels
          find artifacts -name '*.whl' -exec mv {} wheels/ \;
          ls -l wheels
          [ -n "$(ls -A wheels)" ] || { echo "no wheels to publish" >&2; exit 1; }

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels
